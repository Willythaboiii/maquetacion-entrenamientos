<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>App de Entrenamientos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
    }

    header {
      background: #222;
      color: #fff;
      padding: 1rem;
      text-align: center;
    }

    nav {
      display: flex;
      justify-content: center;
      gap: 1rem;
      background: #444;
      padding: 0.5rem;
    }

    nav button {
      background: #fff;
      border: none;
      padding: 0.5rem 1rem;
      cursor: pointer;
    }

    main {
      padding: 1rem;
    }

    section {
      display: none;
    }

    section.active {
      display: block;
    }

    .card {
      border: 1px solid #ccc;
      padding: 1rem;
      margin-bottom: 1rem;
      border-radius: 6px;
    }

    footer {
      background: #222;
      color: #fff;
      text-align: center;
      padding: 0.5rem;
    }

    @media (max-width: 600px) {
      nav {
        flex-direction: column;
      }
    }
  </style>
</head>

<body>

<header>
  <h1>App de Entrenamientos</h1>
</header>

<nav>
  <button onclick="mostrar('inicio')">Inicio</button>
  <button onclick="mostrar('rutinas')">Rutinas</button>
  <button onclick="mostrar('progreso')">Progreso</button>
</nav>

<main>
  <!-- Pantalla 1 -->
  <section id="inicio" class="active">
    <h2>Inicio</h2>
    <p>Bienvenido a la aplicación de entrenamientos.</p>
  </section>

  <!-- Pantalla 2 -->
  <section id="rutinas">
    <h2>Rutinas</h2>
    <div class="card">Rutina Principiante</div>
    <div class="card">Rutina Intermedia</div>
    <div class="card">Rutina Avanzada</div>
  </section>

  <!-- Pantalla 3 -->
  <section id="progreso">
    <h2>Progreso</h2>
    <p>Seguimiento semanal del entrenamiento.</p>
    <div class="card">Semana 1: Completada</div>
    <div class="card">Semana 2: En progreso</div>
  </section>
</main>

<footer>
  <p>© 2026 App de Entrenamientos</p>
</footer>

<script>
  function mostrar(id) {
    document.querySelectorAll("section").forEach(sec => {
      sec.classList.remove("active");
    });
    document.getElementById(id).classList.add("active");
  }
</script>

</body>
</html>
